# ============================================================
# WORKFLOW NAME
# ============================================================
# This name appears in the GitHub Actions UI under the
# "Actions" tab of the repository.

name: python-workflow


# ============================================================
# WORKFLOW TRIGGERS
# ============================================================
# This workflow will automatically start when:
#
# 1. Code is pushed to the main branch
# 2. A pull request is opened or updated targeting main
#
# This is a typical Continuous Integration (CI) setup
# where code changes are validated before merging.

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


# ============================================================
# JOB DEFINITIONS
# ============================================================
# A workflow can contain multiple jobs.
#
# Important concept:
# Each job runs on a fresh virtual machine called a runner.
#
# Runners are temporary, so files do NOT persist
# between jobs unless artifacts are used.

jobs:


  # ==========================================================
  # JOB 1 : UNIT TEST EXECUTION
  # ==========================================================
  # Purpose of this job:
  #
  # - Validate Python application
  # - Install dependencies
  # - Run automated tests
  # - Generate coverage reports

  unit-tests:

    name: Running unit test

    # GitHub will automatically start a Linux VM runner
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # STEP 1 : DOWNLOAD REPOSITORY CODE
      # ------------------------------------------------------
      # GitHub runners start with an empty filesystem.
      #
      # This step downloads the repository source code
      # into the runner machine.

      - name: Checkout Code
        uses: actions/checkout@v4



      # ------------------------------------------------------
      # STEP 2 : INSTALL PYTHON RUNTIME
      # ------------------------------------------------------
      # This installs Python version 3.10 on the runner.
      #
      # Many projects require a specific Python version,
      # so we explicitly define it here.

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'



      # ------------------------------------------------------
      # STEP 3 : INSTALL PROJECT DEPENDENCIES
      # ------------------------------------------------------
      # Python projects usually depend on external libraries.
      #
      # These dependencies are listed in requirements.txt.
      #
      # pip is Python's package manager used to install them.

      - name: Installing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      # ------------------------------------------------------
      # STEP 4 : RUN UNIT TESTS
      # ------------------------------------------------------
      # pytest is a popular Python testing framework.
      #
      # This command:
      # 1. Creates a reports folder
      # 2. Executes test cases
      # 3. Generates test results
      # 4. Generates code coverage report

      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml --cov-report=term-missing -v



      # ------------------------------------------------------
      # STEP 5 : UPLOAD TEST REPORTS
      # ------------------------------------------------------
      # GitHub runners are temporary machines.
      #
      # Once the job finishes, the VM is destroyed.
      #
      # To preserve test reports we upload them as artifacts.

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: reports/



  # ==========================================================
  # JOB 2 : CODEQL SECURITY SCAN
  # ==========================================================
  # CodeQL is GitHub's static code analysis engine.
  #
  # It scans source code to detect security vulnerabilities
  # such as:
  #
  # - SQL Injection
  # - Command Injection
  # - Unsafe user input
  # - Hardcoded secrets
  # - Path traversal vulnerabilities
  #
  # The results appear in:
  #
  # Repository → Security → Code Scanning Alerts

  codeql:

    name: CodeQL security scan

    runs-on: ubuntu-latest


    # ----------------------------------------------------------
    # PERMISSIONS
    # ----------------------------------------------------------
    # GitHub workflows run with limited permissions by default.
    #
    # CodeQL requires permission to upload security results.

    permissions:
      actions: read
      contents: read
      security-events: write



    # ----------------------------------------------------------
    # MATRIX STRATEGY
    # ----------------------------------------------------------
    # Matrix allows running the job for multiple languages.
    #
    # Example:
    # python
    # javascript
    # java
    #
    # Here we only scan Python.

    strategy:
      fail-fast: false
      matrix:
        language: ['python']



    steps:

      # ------------------------------------------------------
      # STEP 1 : CHECKOUT CODE
      # ------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4



      # ------------------------------------------------------
      # STEP 2 : INITIALIZE CODEQL ENGINE
      # ------------------------------------------------------
      # This prepares CodeQL to analyze the code.
      #
      # It converts the source code into a CodeQL database
      # representing program structure.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}



      # ------------------------------------------------------
      # STEP 3 : RUN SECURITY ANALYSIS
      # ------------------------------------------------------
      # This runs built-in security queries on the
      # CodeQL database to detect vulnerabilities.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"



  # ==========================================================
  # JOB 3 : SONARQUBE CODE QUALITY ANALYSIS
  # ==========================================================
  # SonarQube analyzes code quality and maintainability.
  #
  # It detects:
  #
  # - Code smells
  # - Bugs
  # - Duplicate code
  # - Security issues
  # - Technical debt

  sonarqube:

    name: SonarQube Scan

    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # STEP 1 : CHECKOUT CODE
      # ------------------------------------------------------
      # fetch-depth:0 ensures full git history is downloaded
      # which improves SonarQube analysis accuracy.

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0



      # ------------------------------------------------------
      # STEP 2 : RUN SONARQUBE SCAN
      # ------------------------------------------------------
      # SONAR_TOKEN is stored securely inside
      # GitHub repository secrets.

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



# ============================================================
# WORKFLOW EXECUTION FLOW (CI PIPELINE EXPLAINED)
# ============================================================
#
# Step 1
# A developer pushes code or opens a pull request.
#
# Step 2
# GitHub detects the event trigger.
#
# Step 3
# GitHub creates temporary virtual machines (runners).
#
# Step 4
# Three jobs run in parallel:
#
# unit-tests
# codeql
# sonarqube
#
# Step 5
# unit-tests job:
#
# - repository downloaded
# - Python installed
# - dependencies installed
# - pytest runs tests
# - coverage report generated
# - report uploaded as artifact
#
# Step 6
# codeql job:
#
# - repository downloaded
# - CodeQL engine initialized
# - code converted to internal database
# - security queries executed
# - vulnerabilities reported
#
# Step 7
# sonarqube job:
#
# - repository downloaded
# - code scanned for maintainability and bugs
# - results sent to SonarQube dashboard
#
# Step 8
# Results are visible in GitHub:
#
# Tests → Actions tab
# Security issues → Security tab
# Code quality → SonarQube dashboard
#
# ============================================================
# FINAL CI PIPELINE ARCHITECTURE
# ============================================================
#
# Developer Push / PR
#          ↓
# GitHub Actions Trigger
#          ↓
# ┌───────────────────────────────┐
# │ Unit Tests                    │
# │ Code Coverage                 │
# └───────────────────────────────┘
#          ↓
# ┌───────────────────────────────┐
# │ CodeQL Security Scan          │
# └───────────────────────────────┘
#          ↓
# ┌───────────────────────────────┐
# │ SonarQube Quality Scan        │
# └───────────────────────────────┘
#
# This ensures:
#
# Code works correctly
# Code is secure
# Code quality is maintained
#
# before it gets merged into main.
#
# ============================================================