# ============================================================
# WORKFLOW NAME
# ============================================================
# This name appears in the GitHub Actions UI
# under the Actions tab for this repository
name: python-workflow


# ============================================================
# WORKFLOW TRIGGERS
# ============================================================
# This workflow will start automatically when:
#
# 1. Code is pushed to the main branch
# 2. A Pull Request is opened or updated targeting the main branch
#
# These triggers are commonly used for CI pipelines.

on: 
  push:
    branches:
      - main        # Runs workflow when commits are pushed to main branch

  pull_request:
    branches:
      - main        # Runs workflow when a PR targets main branch


# ============================================================
# JOB DEFINITIONS
# ============================================================
# A workflow can contain multiple jobs.
# Each job runs on a fresh virtual machine (runner).
#
# Jobs run in parallel by default unless dependencies are defined.

jobs:


  # ==========================================================
  # JOB : UNIT TEST EXECUTION
  # ==========================================================
  # Purpose:
  # This job validates the application by running unit tests.
  #
  # It performs the following:
  # - Downloads the repository code
  # - Installs Python runtime
  # - Installs project dependencies
  # - Executes unit tests

  unit-tests:

    name: Running unit test      # Friendly job name visible in GitHub UI

    runs-on: ubuntu-latest       # GitHub will provision a fresh Ubuntu VM runner

    steps:

    # ----------------------------------------------------------
    # STEP 1 : CHECKOUT REPOSITORY CODE
    # ----------------------------------------------------------
    # GitHub runners start with an EMPTY filesystem.
    #
    # This step downloads the repository source code
    # into the runner workspace so that the pipeline
    # can access project files.

      - name: Checkout COde
        uses: actions/checkout@v6.0.2


    # ----------------------------------------------------------
    # STEP 2 : SETUP PYTHON RUNTIME
    # ----------------------------------------------------------
    # This installs Python version 3.10 on the runner.
    #
    # Without this step the runner would not know
    # which Python version to use.
    #
    # The action also configures PATH so that python
    # commands work automatically.

      - name: setup python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'


    # ----------------------------------------------------------
    # STEP 3 : INSTALL APPLICATION DEPENDENCIES
    # ----------------------------------------------------------
    # Most Python applications depend on external libraries.
    #
    # These dependencies are listed inside requirements.txt.
    #
    # The commands below perform two actions:
    #
    # 1. Upgrade pip package manager
    # 2. Install project dependencies

      - name: Installing Dependencies
        run: |
           python -m pip install --upgrade pip     # upgrades pip to latest version
           pip install -y requirement.txt          # installs dependencies listed in requirements file


    # ----------------------------------------------------------
    # STEP 4 : EXECUTE UNIT TESTS
    # ----------------------------------------------------------
    # pytest is a popular Python testing framework.
    #
    # "-v" enables verbose mode which shows
    # detailed output of each test case.

      - name: Run unit tests
        run: pytest -v



# ============================================================
# WORKFLOW EXECUTION FLOW (EXPLANATION)
# ============================================================
#
# The complete flow of this workflow looks like this:
#
# 1. Developer pushes code to the main branch
#    OR opens a Pull Request targeting main.
#
# 2. GitHub Actions detects the event trigger.
#
# 3. GitHub provisions a fresh runner VM:
#       ubuntu-latest
#
# 4. The job "unit-tests" starts executing.
#
# 5. Step 1 (Checkout Code)
#       The repository source code is downloaded
#       to the runner workspace.
#
# 6. Step 2 (Setup Python)
#       Python 3.10 runtime is installed and configured.
#
# 7. Step 3 (Install Dependencies)
#       pip installs all packages required by the application.
#
# 8. Step 4 (Run Tests)
#       pytest runs all test files inside the repository.
#
# 9. GitHub collects the results:
#
#       If tests PASS  → workflow succeeds
#       If tests FAIL  → workflow fails
#
# 10. The result appears in:
#
#       Repository → Actions tab
#
# ============================================================
# WHY THIS PIPELINE IS IMPORTANT
# ============================================================
#
# Running automated tests in CI ensures:
#
# - Code changes do not break existing functionality
# - Bugs are detected early
# - Pull requests are validated before merging
#
# This is a core principle of modern CI/CD pipelines.
#
# ============================================================
