name: download-artifact-actions   # Name of the workflow shown in the GitHub Actions UI
                                  # This workflow demonstrates both uploading and downloading artifacts

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# The workflow starts whenever a push event happens
# in this repository (any branch).
on:
  push:                  # Trigger event

jobs:                    # A workflow must contain at least one job

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1                 # Display name of the job in the GitHub UI
    runs-on: ubuntu-latest     # GitHub provisions an Ubuntu runner VM

    steps:                     # Steps inside a job execute sequentially

      - name: step-1
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   Prints the current working directory of the runner
        #
        # ls -ltr
        #   Lists files and directories in the runner workspace
        #
        # hostname
        #   Displays the hostname of the runner machine


      - name: step-2 checkout
        uses: actions/checkout@v4
        # This action clones the repository to the runner workspace
        # so workflow steps can access repository files


      - name: step3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
        # Creates files that will later be uploaded as artifacts
        #
        # myartifact.txt
        #   stores current working directory path
        #
        # artifacts/list.txt
        #   stores directory listing
        #
        # artifacts/hostname.txt
        #   stores runner hostname


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt
        # Uploads a single file artifact
        #
        # Artifact name: single-file
        # File uploaded: myartifact.txt


      - name: upload from directory
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/
        # Uploads the entire directory "artifacts"
        # including all files inside it


      - name: upload from multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/
        # Uploads multiple files and directories
        #
        # Includes:
        #   myartifact.txt
        #   artifacts folder


      - name: upload from multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
        # Uploads multiple paths but excludes hostname.txt
        #
        # "!" is used to exclude files using glob pattern


  # ==========================================================
  # JOB 2 : DOWNLOAD ARTIFACTS
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest

    needs: job1
    # This ensures job2 runs only after job1 completes
    # because artifacts are produced in job1

    steps:

      - name: checking current directory
        run: |
          pwd
          ls -ltr
        # Shows current workspace contents before downloading artifacts


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file
        # Downloads artifact named "single-file"
        #
        # GitHub automatically extracts the artifact
        # into a folder with the same artifact name


      - name: checking current directory post download
        run: |
          pwd
          ls -ltr
        # Shows directory contents after artifact download
        #
        # You will now see the downloaded artifact files



# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================
#
# STEP 1
# A developer pushes code to the repository.
#
#
# STEP 2
# GitHub detects the push trigger and loads workflows
# from the directory:
#
#   .github/workflows/
#
#
# STEP 3
# GitHub provisions runner VMs for jobs.
#
#
# ============================================================
# JOB EXECUTION ORDER
# ============================================================
#
# job1 runs first
#
# job2 depends on job1 using:
#
#   needs: job1
#
# So job2 starts only after job1 finishes.
#
#
# ============================================================
# JOB1 PROCESS
# ============================================================
#
# Step1 prints environment information
#
# Step2 clones repository using checkout action
#
# Step3 creates artifact files
#
# Files created:
#
#   myartifact.txt
#
#   artifacts/
#       list.txt
#       hostname.txt
#
#
# Step4 uploads artifacts to GitHub storage
#
# Upload patterns demonstrated:
#
#   single file upload
#   directory upload
#   multiple paths upload
#   path exclusion
#
#
# ============================================================
# JOB2 PROCESS
# ============================================================
#
# Job2 starts only after job1 completes.
#
# Step1 prints directory contents before download
#
# Step2 downloads artifact named:
#
#   single-file
#
# Step3 prints directory contents again to confirm
# the artifact file has been downloaded.
#
#
# ============================================================
# WHY DOWNLOAD ARTIFACTS
# ============================================================
#
# Artifacts allow passing files between jobs.
#
# Because GitHub runners are ephemeral,
# files created in job1 do not exist in job2
# unless they are uploaded as artifacts.
#
#
# ============================================================
# REAL DEVOPS USE CASES
# ============================================================
#
# Build job
#   compile application
#   upload build artifact
#
# Test job
#   download build artifact
#   run tests
#
# Deploy job
#   download artifact
#   deploy application
#
#
# ============================================================
# PIPELINE ARCHITECTURE
# ============================================================
#
# job1  (build artifacts)
#   ↓
# job2  (consume artifacts)
#
# ============================================================
