name: download-artifact-actions   # Workflow name visible in GitHub Actions UI
                                  # Demonstrates uploading and downloading artifacts between jobs

# ============================================================
# WORKFLOW TRIGGER
# ============================================================
# The workflow runs whenever a push occurs in the repository
on:
  push:

jobs:

  # ==========================================================
  # JOB 1 : CREATE AND UPLOAD ARTIFACTS
  # ==========================================================
  job1:
    name: job1
    runs-on: ubuntu-latest      # GitHub provisions an Ubuntu runner VM

    steps:

      - name: step-1 basic system information
        run: |
          pwd
          ls -ltr
          hostname
        # pwd
        #   Prints current working directory of the runner
        #
        # ls -ltr
        #   Lists files in current workspace
        #
        # hostname
        #   Displays the hostname of the runner


      - name: step-2 checkout repository
        uses: actions/checkout@v4
        # Downloads repository source code to the runner
        # Required if workflow needs access to repo files


      - name: step-3 create files for artifacts
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
        # Creates files that will be uploaded as artifacts
        #
        # myartifact.txt
        #   contains runner working directory
        #
        # artifacts/list.txt
        #   contains directory listing
        #
        # artifacts/hostname.txt
        #   contains runner hostname


      - name: upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single-file
          path: ./myartifact.txt
        # Uploads a single file artifact


      - name: upload directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/
        # Uploads entire directory


      - name: upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths
          path: |
            ./myartifact.txt
            artifacts/
        # Uploads multiple paths together


      - name: upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple-paths-with-exclusion
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
        # Uploads paths but excludes hostname.txt
        # "!" is used for exclusion patterns


  # ==========================================================
  # JOB 2 : DOWNLOAD SINGLE FILE ARTIFACT
  # ==========================================================
  job2:
    name: job2
    runs-on: ubuntu-latest
    needs: job1                 # job2 starts only after job1 finishes

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr
        # Shows files before artifact download


      - name: download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single-file
        # Downloads artifact created in job1


      - name: check workspace after download
        run: |
          pwd
          ls -ltr
        # Verifies downloaded artifact exists


  # ==========================================================
  # JOB 3 : DOWNLOAD DIRECTORY ARTIFACT
  # ==========================================================
  job3:
    name: job3
    runs-on: ubuntu-latest
    needs: job1                 # job3 also depends on job1

    steps:

      - name: check workspace before download
        run: |
          pwd
          ls -ltr
        # Shows directory before downloading artifact


      - name: download directory artifact
        uses: actions/download-artifact@v4
        with:
          name: directory_artifacts
        # Downloads the directory artifact created in job1


      - name: check workspace after download
        run: |
          pwd
          ls -ltr
        # Verifies directory artifact downloaded successfully



# ============================================================
# COMPLETE WORKFLOW EXECUTION FLOW
# ============================================================

# STEP 1
# A developer pushes code to the repository.

# STEP 2
# GitHub detects the push trigger and scans:
# .github/workflows/

# STEP 3
# GitHub loads this workflow and creates a workflow run.

# STEP 4
# GitHub provisions runner machines for jobs.


# ============================================================
# JOB EXECUTION ORDER
# ============================================================

# job1 starts first.

# job2 and job3 depend on job1 using:
#   needs: job1

# After job1 finishes:
#   job2 and job3 start in parallel.


# ============================================================
# JOB1 PROCESS
# ============================================================

# Step1 prints runner environment information.

# Step2 downloads repository code.

# Step3 creates artifact files:

#   myartifact.txt
#   artifacts/list.txt
#   artifacts/hostname.txt

# Step4 uploads artifacts using different patterns:

#   single file
#   directory
#   multiple paths
#   exclusion pattern


# ============================================================
# JOB2 PROCESS
# ============================================================

# job2 starts after job1 completes.

# Step1 prints current workspace.

# Step2 downloads artifact:
#   single-file

# Step3 verifies the artifact exists in workspace.


# ============================================================
# JOB3 PROCESS
# ============================================================

# job3 also waits for job1.

# Step1 prints workspace state.

# Step2 downloads artifact:
#   directory_artifacts

# Step3 verifies downloaded directory.


# ============================================================
# PIPELINE ARCHITECTURE
# ============================================================

#           job1
#         (build artifacts)
#          /        \
#       job2       job3
#   (download file) (download directory)


# ============================================================
# IMPORTANT CONCEPT
# ============================================================

# GitHub runners are EPHEMERAL.

# Each job runs on a new VM.

# Files created in job1 do NOT exist in job2/job3
# unless uploaded as artifacts.

# Artifacts allow data transfer between jobs.
